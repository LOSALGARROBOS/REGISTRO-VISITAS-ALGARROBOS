<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autorizar Visitas - Vecinos</title>
    <style>
        body { font-family: sans-serif; background: #e9ecef; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #6610f2; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 25px; background: #6610f2; color: white; font-size: 16px; }
        .btn:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Autorizar Visita</h2>
        <form id="vecinoForm">
            <input type="hidden" name="origen" value="VECINO">
            
            <label>Su Lote / Casa</label>
            <input type="text" name="lote" placeholder="N° de su unidad" required>

            <label>DNI del Visitante</label>
            <input type="number" name="dni" placeholder="DNI del invitado" required>

            <label>Nombre del Visitante</label>
            <input type="text" name="nombre" placeholder="Nombre y Apellido" required>

            <label>Fecha de la Visita</label>
            <input type="date" name="vence" required>

            <button type="submit" id="btn" class="btn">ENVIAR AUTORIZACIÓN</button>
        </form>
    </div>
    <script>
       
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzuq3DJDw_83d49MkrbPSTG9nIdPb-OUhiZXIJVZiOpjTarnx4s944yMFaWqzfqOMUx/exec';
        
        const form = document.getElementById('vecinoForm');
        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            btn.disabled = true;
            btn.innerText = "Enviando...";
            
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(() => {
                    alert("Autorización enviada con éxito.");
                    form.reset();
                    btn.disabled = false;
                    btn.innerText = "ENVIAR AUTORIZACIÓN";
                })
                .catch(() => {
                    alert("Error al enviar. Intente de nuevo.");
                    btn.disabled = false;
                    btn.innerText = "ENVIAR AUTORIZACIÓN";
                });
        });
    </script>
</body>
</html>
