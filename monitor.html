<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor - Los Algarrobos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .container { background: #262626; padding: 20px; border-radius: 12px; max-width: 1100px; margin: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        
        /* Estilos para el Reloj y Encabezado */
        .header-info { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #444; padding-bottom: 15px; margin-bottom: 20px; }
        .reloj { font-size: 18px; color: #007bff; font-weight: bold; background: #333; padding: 10px 20px; border-radius: 8px; border: 1px solid #444; }
        h2 { margin: 0; color: #ecf0f1; font-size: 24px; }
        
        .alert-turno { background: #d9534f; color: white; padding: 20px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; display: none; text-align: center; font-size: 22px; animation: blink 2s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.7;} 100% {opacity: 1;} }
        
        table { width: 100%; border-collapse: collapse; background: #333; }
        th, td { border: 1px solid #444; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; text-transform: uppercase; font-size: 13px; }
        .row-alerta { background-color: #f0ad4e !important; color: #000 !important; font-weight: bold; }
        .count { background: #007bff; padding: 2px 12px; border-radius: 15px; font-size: 16px; margin-left: 10px; }
        tr:nth-child(even) { background-color: #2b2b2b; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Encabezado con Fecha y Hora Actual -->
        <div class="header-info">
            <h2>Gente en Predio <span id="contador" class="count">0</span></h2>
            <div id="relojActual" class="reloj">Cargando fecha...</div>
        </div>

        <div id="alertaHorario" class="alert-turno">⚠️ ATENCIÓN: PERSONAL TRABAJANDO FUERA DE HORA (Post 18:00hs)</div>
        
        <table id="tablaAdentro">
            <thead>
                <tr>
                    <th>Fecha Ingreso</th>
                    <th>Hora</th>
                    <th>Nombre</th>
                    <th>Calidad</th>
                    <th>Lote</th>
                    <th>Patente</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwha5jW5OTt63tQzjL6b51Lp9HASHPG6QUC9hkdZHELqLSUtnfT9khHJURO3pZOTPT-/exec';

        // Función para el reloj del encabezado
        function actualizarReloj() {
            const ahora = new Date();
            const opciones = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                timeZone: 'America/Argentina/Buenos_Aires'
            };
            document.getElementById('relojActual').innerText = ahora.toLocaleDateString('es-AR', opciones);
        }

        function esHoraRestringida() {
            const ahora = new Date();
            const hora = parseInt(ahora.toLocaleString("es-AR", {hour: '2-digit', hour12: false, timeZone: "America/Argentina/Buenos_Aires"}));
            return hora >= 18 || hora < 7;
        }

        function actualizar() {
            fetch(`${scriptURL}?accion=getAdentro`)
                .then(res => res.json())
                .then(data => {
                    const tbody = document.querySelector("#tablaAdentro tbody");
                    const alertaBox = document.getElementById("alertaHorario");
                    tbody.innerHTML = "";
                    let hayAlerta = false;
                    const restringido = esHoraRestringida();
                    
                    document.getElementById("contador").innerText = data.length;

                    data.forEach(p => {
                        let fila = document.createElement("tr");
                        if (p.calidad !== "Visita" && restringido) { 
                            fila.className = "row-alerta"; 
                            hayAlerta = true; 
                        }
                        
                        // Si el script no envía la fecha, usamos la actual como fallback, 
                        // pero el script ya debería enviarla tras la actualización del .gs
                        fila.innerHTML = `
                            <td>${p.fecha || '-'}</td>
                            <td>${p.hora}</td>
                            <td>${p.nombre}</td>
                            <td>${p.calidad}</td>
                            <td>${p.lote}</td>
                            <td>${p.patente || '-'}</td>
                        `;
                        tbody.appendChild(fila);
                    });
                    alertaBox.style.display = hayAlerta ? "block" : "none";
                });
        }

        // Iniciar reloj y monitor
        setInterval(actualizarReloj, 1000);
        actualizarReloj();
        actualizar();
        setInterval(actualizar, 30000);
    </script>
</body>
</html>
