<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardia - Los Algarrobos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 10px; display: flex; justify-content: center; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; }
        h2 { text-align: center; color: #1c1e21; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .alert-turno { background: #ffc107; color: #856404; padding: 15px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; display: none; text-align: center; border: 2px solid #ffeeba; }
        .search-box { background: #e7f3ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .status-msg { text-align: center; font-weight: bold; padding: 10px; border-radius: 5px; margin-top: 10px; display: none; }
        .autorizado { background: #d4edda; color: #155724; }
        .no-autorizado { background: #f8d7da; color: #721c24; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        .btn-save { width: 100%; background: #28a745; color: white; padding: 15px; border: none; border-radius: 6px; font-weight: bold; margin-top: 20px; cursor: pointer; font-size: 16px; }
        .monitor-box { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f8f9fa; }
        .row-alerta { background-color: #fff3cd; color: #856404; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div id="alertaHorario" class="alert-turno">
            ⚠️ ATENCIÓN: Personal de trabajo dentro del barrio en horario no permitido.
        </div>
        <h2>Panel de Seguridad</h2>
        <div class="search-box">
            <label>DNI del Visitante:</label>
            <input type="number" id="dniBusqueda">
            <button type="button" class="btn-save" style="margin-top:10px; background:#007bff;" onclick="verificarDNI()">BUSCAR</button>
            <div id="resultado" class="status-msg"></div>
        </div>
        <form id="visitaForm">
            <input type="hidden" name="origen" value="GUARDIA">
            <label>Movimiento</label>
            <select name="movimiento">
                <option value="INGRESO" selected>🟢 INGRESO</option>
                <option value="SALIDA">🔴 SALIDA</option>
            </select>
            <label>Nombre</label>
            <input type="text" name="nombre" id="nombreField" required>
            <label>Calidad</label>
            <select name="calidad" id="calidadField">
                <option value="Visita">Visita Social</option>
                <option value="Empleada Doméstica">Empleada Doméstica</option>
                <option value="Jardinero">Jardinero</option>
                <option value="Carpintero">Carpintero</option>
                <option value="Albañil">Albañil</option>
                <option value="Plomero">Plomero</option>
                <option value="Otros">Otros</option>
            </select>
            <label>DNI</label>
            <input type="number" name="dni" id="dniField" required>
            <label>Lote</label>
            <input type="text" name="lote" id="loteField" required>
            <label>Patente</label>
            <input type="text" name="patente">
            <label>Observaciones</label>
            <input type="text" name="observaciones">
            <button type="submit" id="btnEnviar" class="btn-save">REGISTRAR MOVIMIENTO</button>
        </form>
        <div class="monitor-box">
            <h3>Personas en el Predio</h3>
            <button onclick="actualizarMonitor()" style="cursor:pointer; padding:5px;">🔄 Actualizar Lista</button>
            <table id="tablaAdentro">
                <thead><tr><th>Nombre</th><th>Tipo</th><th>Lote</th><th>Ingreso</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwHwJ1SJnLQzJWI79ity9jyilnLFj8xNYvg6nGVRhUXn-YXJpxtV4fMwiWKav5PxKYi-g/exec';
        
        function esHoraRestringida() {
            const ahora = new Date();
            const hora = parseInt(ahora.toLocaleString("es-AR", {hour: '2-digit', hour12: false, timeZone: "America/Argentina/Buenos_Aires"}));
            return hora >= 18 || hora < 7;
        }

        function verificarDNI() {
            const dni = document.getElementById('dniBusqueda').value;
            const resDiv = document.getElementById('resultado');
            resDiv.style.display = "block"; resDiv.innerText = "Buscando...";
            fetch(`${scriptURL}?dni=${dni}`)
                .then(res => res.json())
                .then(data => {
                    if(data.status === "AUTORIZADO") {
                        resDiv.innerText = `✅ AUTORIZADO: ${data.calidad} - Lote ${data.lote}`;
                        resDiv.className = "status-msg autorizado";
                        document.getElementById('nombreField').value = data.nombre;
                        document.getElementById('dniField').value = dni;
                        document.getElementById('loteField').value = data.lote;
                        document.getElementById('calidadField').value = data.calidad;
                    } else if(data.status === "VENCIDO") {
                        resDiv.innerText = `⛔ VENCIDO: ${data.msg}`;
                        resDiv.className = "status-msg no-autorizado";
                    } else {
                        resDiv.innerText = "❌ SIN AUTORIZACIÓN";
                        resDiv.className = "status-msg no-autorizado";
                        document.getElementById('dniField').value = dni;
                    }
                });
        }

        function actualizarMonitor() {
            const tbody = document.querySelector("#tablaAdentro tbody");
            const alertaBox = document.getElementById("alertaHorario");
            fetch(`${scriptURL}?accion=getAdentro`)
                .then(res => res.json())
                .then(data => {
                    tbody.innerHTML = "";
                    let alertaActiva = false;
                    const restringido = esHoraRestringida();
                    data.forEach(p => {
                        let fila = document.createElement("tr");
                        if (p.calidad !== "Visita" && restringido) { fila.className = "row-alerta"; alertaActiva = true; }
                        fila.innerHTML = `<td>${p.nombre}</td><td>${p.calidad}</td><td>${p.lote}</td><td>${p.hora}</td>`;
                        tbody.appendChild(fila);
                    });
                    alertaBox.style.display = alertaActiva ? "block" : "none";
                });
        }

        document.getElementById('visitaForm').addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true; btn.innerText = "Guardando...";
            fetch(scriptURL, { method: 'POST', body: new FormData(e.target)})
                .then(() => { alert("Registro guardado"); e.target.reset(); btn.disabled = false; btn.innerText = "REGISTRAR MOVIMIENTO"; actualizarMonitor(); });
        });
        actualizarMonitor();
        setInterval(actualizarMonitor, 300000);
    </script>
</body>
</html>
