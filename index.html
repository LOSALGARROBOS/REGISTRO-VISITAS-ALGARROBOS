<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardia - Los Algarrobos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 10px; display: flex; justify-content: center; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; width: 100%; }
        h2 { text-align: center; color: #1c1e21; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .search-box { background: #e7f3ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .status-msg { text-align: center; font-weight: bold; padding: 10px; border-radius: 5px; margin-top: 10px; display: none; }
        .autorizado { background: #d4edda; color: #155724; }
        .no-autorizado { background: #f8d7da; color: #721c24; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        .btn-blue { background: #007bff; color: white; width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-green { background: #28a745; color: white; width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Ingreso/Salida</h2>
        <div class="search-box">
            <label>DNI a Verificar:</label>
            <input type="number" id="dniBusqueda" placeholder="Ingrese DNI">
            <button type="button" class="btn-blue" onclick="verificarDNI()">BUSCAR AUTORIZACIÓN</button>
            <div id="resultado" class="status-msg"></div>
        </div>
        <form id="visitaForm">
            <input type="hidden" name="origen" value="GUARDIA">
            <label>Movimiento</label>
            <select name="movimiento">
                <option value="INGRESO" selected>🟢 INGRESO</option>
                <option value="SALIDA">🔴 SALIDA</option>
            </select>
            <label>Nombre Visitante</label>
            <input type="text" name="nombre" id="nombreField" required>
            <label>Calidad</label>
            <select name="calidad" id="calidadField">
                <option value="Visita">Visita Social</option>
                <option value="Empleada Doméstica">Empleada Doméstica</option>
                <option value="Jardinero">Jardinero</option>
                <option value="Carpintero">Carpintero</option>
                <option value="Albañil">Albañil</option>
                <option value="Plomero">Plomero</option>
                <option value="Otros">Otros</option>
            </select>
            <label>DNI</label>
            <input type="number" name="dni" id="dniField" required>
            <label>Lote</label>
            <input type="text" name="lote" id="loteField" required>
            <label>Patente</label>
            <input type="text" name="patente" placeholder="Opcional">
            <label>Observaciones</label>
            <input type="text" name="observaciones" placeholder="Opcional">
            <button type="submit" id="btnEnviar" class="btn-green">GUARDAR REGISTRO</button>
        </form>
    </div>
    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycby26ncJJ4Mgy8m1WCBN5m6Re1nFUM-4fWdQrQmweqlP05072bysOrKy7bBzVs1Slc93_g/exec';

        function verificarDNI() {
            const dni = document.getElementById('dniBusqueda').value;
            const resDiv = document.getElementById('resultado');
            if(!dni) return alert("Ingrese un DNI");
            resDiv.style.display = "block"; resDiv.className = "status-msg"; resDiv.innerText = "Buscando...";

            fetch(`${scriptURL}?dni=${dni}`)
                .then(res => res.json())
                .then(data => {
                    if(data.status === "AUTORIZADO") {
                        resDiv.innerText = `✅ AUTORIZADO: ${data.calidad} - Lote ${data.lote}`;
                        resDiv.className = "status-msg autorizado";
                        document.getElementById('nombreField').value = data.nombre;
                        document.getElementById('dniField').value = dni;
                        document.getElementById('loteField').value = data.lote;
                        document.getElementById('calidadField').value = data.calidad;
                    } else if(data.status === "VENCIDO") {
                        resDiv.innerText = `⛔ VENCIDO: ${data.msg}`;
                        resDiv.className = "status-msg no-autorizado";
                    } else {
                        resDiv.innerText = "❌ SIN AUTORIZACIÓN";
                        resDiv.className = "status-msg no-autorizado";
                        document.getElementById('dniField').value = dni;
                    }
                });
        }

        document.getElementById('visitaForm').addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true; btn.innerText = "Enviando...";
            fetch(scriptURL, { method: 'POST', body: new FormData(e.target)})
                .then(() => {
                    alert("¡Registro Exitoso!");
                    e.target.reset();
                    document.getElementById('resultado').style.display = "none";
                    btn.disabled = false; btn.innerText = "GUARDAR REGISTRO";
                });
        });
    </script>
</body>
</html>
