<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Acceso - Registro de Barrio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 450px; width: 100%; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 25px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; color: #34495e; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #dcdfe6; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: border 0.3s; }
        input:focus, select:focus { border-color: #3498db; outline: none; }
        .btn-submit { width: 100%; background: #3498db; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 30px; font-size: 16px; transition: background 0.3s; }
        .btn-submit:hover { background: #2980b9; }
        .btn-submit:disabled { background: #bdc3c7; cursor: not-allowed; }
        .success-msg { color: #27ae60; text-align: center; margin-top: 20px; display: none; font-weight: bold; padding: 10px; background: #e8f5e9; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Control de Guardia</h2>
        <form id="visitaForm">
            <label>Tipo de Movimiento</label>
            <select name="movimiento" required>
                <option value="INGRESO" selected>🟢 INGRESO</option>
                <option value="SALIDA">🔴 SALIDA</option>
            </select>

            <label>Nombre del Visitante</label>
            <input type="text" name="nombre" placeholder="Nombre y Apellido" required>
            
            <label>DNI</label>
            <input type="number" name="dni" placeholder="DNI del visitante" required>
            
            <label>Lote / Casa</label>
            <input type="text" name="lote" placeholder="N° de unidad" required>
            
            <label>Patente del Vehículo</label>
            <input type="text" name="patente" placeholder="Patente (opcional)">
            
            <label>Observaciones</label>
            <input type="text" name="observaciones" placeholder="Motivo o detalle">
            
            <button type="submit" id="btnEnviar" class="btn-submit">GUARDAR REGISTRO</button>
        </form>
        <div id="mensajeExito" class="success-msg">¡Datos enviados correctamente!</div>
    </div>

    <script>
        // Tu URL de Google Apps Script ya integrada
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyhQ1HevZIeim1GQmICm0nKaOOmVwr1GnaG0jHTNNX0exHyZE4QG5RuJkaP3-vReoTcyw/exec';
        const form = document.getElementById('visitaForm');
        const btn = document.getElementById('btnEnviar');
        const msg = document.getElementById('mensajeExito');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "Enviando datos...";
            
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    msg.style.display = 'block';
                    form.reset();
                    btn.disabled = false;
                    btn.innerText = "GUARDAR REGISTRO";
                    // Ocultar mensaje de éxito después de 4 segundos
                    setTimeout(() => { msg.style.display = 'none'; }, 4000);
                })
                .catch(error => {
                    alert("Error al conectar con la base de datos. Verifique la conexión.");
                    btn.disabled = false;
                    btn.innerText = "GUARDAR REGISTRO";
                });
        });
    </script>
</body>
</html>
