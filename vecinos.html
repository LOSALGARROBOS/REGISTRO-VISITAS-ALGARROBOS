<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autorizar Visita - Los Algarrobos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e9ecef; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; width: 100%; }
        h2 { color: #6610f2; text-align: center; margin-bottom: 25px; border-bottom: 3px solid #6610f2; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #444; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        input:focus, select:focus { border-color: #6610f2; outline: none; box-shadow: 0 0 5px rgba(102,16,242,0.2); }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 30px; background: #6610f2; color: white; font-size: 18px; transition: 0.3s; }
        .btn:hover { background: #520dc2; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .error-pin { color: #dc3545; font-size: 12px; margin-top: 5px; display: none; font-weight: bold; }
        .nota { font-size: 12px; color: #777; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Nueva Autorización</h2>
        <form id="vecinoForm">
            <input type="hidden" name="origen" value="VECINO">

            <label>Seleccione su Familia / Lote</label>
            <select name="lote" id="selectLote" required>
                <option value="" disabled selected>Cargando listado...</option>
            </select>

            <label>Clave de Seguridad (PIN)</label>
            <input type="password" id="pinInput" placeholder="Ingrese el PIN de su lote" required>
            <div id="errorPin" class="error-pin">⚠️ El PIN no corresponde al lote seleccionado.</div>

            <hr style="margin-top: 25px; border: 0; border-top: 1px solid #eee;">

            <label>DNI del Visitante</label>
            <input type="number" name="dni" placeholder="Sin puntos" required>

            <label>Nombre y Apellido</label>
            <input type="text" name="nombre" placeholder="Nombre completo" required>

            <label>Tipo de Visita (Calidad)</label>
            <select name="calidad">
                <option value="Visita">Visita Social</option>
                <option value="Empleada Doméstica">Empleada Doméstica</option>
                <option value="Jardinero">Jardinero</option>
                <option value="Carpintero">Carpintero</option>
                <option value="Albañil">Albañil</option>
                <option value="Plomero">Plomero</option>
                <option value="Otros">Otros / Proveedor</option>
            </select>

            <label>Válido hasta</label>
            <input type="date" name="vence" id="venceDate" required>
            
            <button type="submit" id="btnSubmit" class="btn" disabled>ENVIAR AUTORIZACIÓN</button>
            <p class="nota">El botón se habilitará cuando el PIN sea correcto.</p>
        </form>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwha5jW5OTt63tQzjL6b51Lp9HASHPG6QUC9hkdZHELqLSUtnfT9khHJURO3pZOTPT-/exec';
        let familiasDB = [];

        const selectLote = document.getElementById('selectLote');
        const pinInput = document.getElementById('pinInput');
        const btnSubmit = document.getElementById('btnSubmit');
        const errorPin = document.getElementById('errorPin');
        const hoy = new Date().toISOString().split('T')[0];

        document.getElementById('venceDate').value = hoy;

        fetch(`${scriptURL}?accion=getFamilias`)
            .then(res => res.json())
            .then(data => {
                familiasDB = data;
                selectLote.innerHTML = '<option value="" disabled selected>Seleccione su lote...</option>';
                familiasDB.sort((a, b) => parseInt(a.lote) - parseInt(b.lote));
                familiasDB.forEach(f => {
                    let opt = document.createElement('option');
                    opt.value = f.lote;
                    opt.innerHTML = `Lote ${f.lote} - ${f.nombre}`;
                    selectLote.appendChild(opt);
                });
            });

        function validar() {
            const loteVal = selectLote.value;
            const pinVal = pinInput.value;
            const familia = familiasDB.find(f => f.lote === loteVal);

            if (familia && pinVal === familia.pin) {
                btnSubmit.disabled = false;
                errorPin.style.display = "none";
                pinInput.style.border = "2px solid #28a745";
            } else {
                btnSubmit.disabled = true;
                pinInput.style.border = "1px solid #ddd";
                if (pinVal.length >= 4) {
                    errorPin.style.display = "block";
                    pinInput.style.border = "2px solid #dc3545";
                }
            }
        }

        selectLote.addEventListener('change', validar);
        pinInput.addEventListener('input', validar);

        document.getElementById('vecinoForm').addEventListener('submit', e => {
            e.preventDefault();
            btnSubmit.disabled = true;
            btnSubmit.innerText = "Procesando...";

            fetch(scriptURL, { method: 'POST', body: new FormData(e.target)})
                .then(response => {
                    alert("Autorización enviada correctamente.");
                    e.target.reset();
                    document.getElementById('venceDate').value = hoy;
                    btnSubmit.innerText = "ENVIAR AUTORIZACIÓN";
                    btnSubmit.disabled = true;
                })
                .catch(error => {
                    alert("Hubo un error.");
                    btnSubmit.disabled = false;
                    btnSubmit.innerText = "ENVIAR AUTORIZACIÓN";
                });
        });
    </script>
</body>
</html>
