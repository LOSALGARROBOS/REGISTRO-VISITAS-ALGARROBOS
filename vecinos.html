<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autorizar Visita - Vecinos</title>
    <style>
        body { font-family: sans-serif; background: #e9ecef; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        h2 { color: #6610f2; text-align: center; border-bottom: 2px solid #6610f2; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 25px; background: #6610f2; color: white; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Nueva Autorización</h2>
        <form id="vecinoForm">
            <input type="hidden" name="origen" value="VECINO">
            <label>N° de Lote</label>
            <input type="text" name="lote" required>
            <label>DNI del Visitante</label>
            <input type="number" name="dni" required>
            <label>Nombre Completo</label>
            <input type="text" name="nombre" required>
            <label>Calidad/Tipo</label>
            <select name="calidad">
                <option value="Visita">Visita Social</option>
                <option value="Empleada Doméstica">Empleada Doméstica</option>
                <option value="Jardinero">Jardinero</option>
                <option value="Carpintero">Carpintero</option>
                <option value="Albañil">Albañil</option>
                <option value="Plomero">Plomero</option>
                <option value="Otros">Otros</option>
            </select>
            <label>Válido hasta (Fecha)</label>
            <input type="date" name="vence" required>
            <button type="submit" id="btn" class="btn">ENVIAR AUTORIZACIÓN</button>
        </form>
    </div>
    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycby26ncJJ4Mgy8m1WCBN5m6Re1nFUM-4fWdQrQmweqlP05072bysOrKy7bBzVs1Slc93_g/exec';
        document.getElementById('vecinoForm').addEventListener('submit', e => {
            e.preventDefault();
            document.getElementById('btn').innerText = "Enviando...";
            fetch(scriptURL, { method: 'POST', body: new FormData(e.target)})
                .then(() => {
                    alert("Autorización registrada con éxito");
                    e.target.reset();
                    document.getElementById('btn').innerText = "ENVIAR AUTORIZACIÓN";
                });
        });
    </script>
</body>
</html>
