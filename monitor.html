<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor - Los Algarrobos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .container { background: #262626; padding: 20px; border-radius: 12px; max-width: 1100px; margin: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .header-info { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #444; padding-bottom: 15px; margin-bottom: 20px; }
        .reloj { font-size: 18px; color: #007bff; font-weight: bold; background: #333; padding: 10px 20px; border-radius: 8px; border: 1px solid #444; }
        h2 { margin: 0; color: #ecf0f1; font-size: 24px; }
        .alert-turno { background: #d9534f; color: white; padding: 20px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; display: none; text-align: center; font-size: 22px; }
        
        table { width: 100%; border-collapse: collapse; background: #333; }
        th, td { border: 1px solid #444; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; text-transform: uppercase; font-size: 13px; }
        
        /* Color para personal fuera de hora (Naranja) */
        .row-alerta { background-color: #f39c12 !important; color: #000 !important; font-weight: bold; }
        
        /* Color para gente hace más de 2 días (Amarillo fuerte) */
        .row-antiguo { background-color: #f1c40f !important; color: #000 !important; font-weight: bold; }
        
        .count { background: #007bff; padding: 2px 12px; border-radius: 15px; font-size: 16px; margin-left: 10px; }
        tr:nth-child(even) { background-color: #2b2b2b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-info">
            <h2>Gente en Predio <span id="contador" class="count">0</span></h2>
            <div id="relojActual" class="reloj">Cargando fecha...</div>
        </div>
        <div id="alertaHorario" class="alert-turno">⚠️ ATENCIÓN: PERSONAL TRABAJANDO FUERA DE HORA</div>
        <table id="tablaAdentro">
            <thead>
                <tr>
                    <th>Fecha Ingreso</th>
                    <th>Hora</th>
                    <th>Nombre</th>
                    <th>Calidad</th>
                    <th>Lote</th>
                    <th>Patente</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwha5jW5OTt63tQzjL6b51Lp9HASHPG6QUC9hkdZHELqLSUtnfT9khHJURO3pZOTPT-/exec';
        
        function actualizarReloj() {
            const ahora = new Date();
            const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'America/Argentina/Buenos_Aires' };
            document.getElementById('relojActual').innerText = ahora.toLocaleDateString('es-AR', opciones);
        }

        function esHoraRestringida() {
            const ahora = new Date();
            const hora = parseInt(ahora.toLocaleString("es-AR", {hour: '2-digit', hour12: false, timeZone: "America/Argentina/Buenos_Aires"}));
            return hora >= 18 || hora < 7;
        }

        function actualizar() {
            fetch(`${scriptURL}?accion=getAdentro`)
                .then(res => res.json())
                .then(data => {
                    const tbody = document.querySelector("#tablaAdentro tbody");
                    const alertaBox = document.getElementById("alertaHorario");
                    tbody.innerHTML = "";
                    let hayAlertaTurno = false;
                    const restringido = esHoraRestringida();
                    const ahora = new Date();

                    document.getElementById("contador").innerText = data.length;
                    
                    // Ordenamos: Los últimos en entrar (más nuevos) aparecen arriba
                    data.reverse();

                    data.forEach(p => {
                        let fila = document.createElement("tr");
                        
                        // Lógica de Alerta por tiempo (más de 2 días)
                        // Convertimos la fecha de p.fecha (DD/MM/YYYY) a formato Date
                        const partesFecha = p.fecha.split('/');
                        const fechaIngreso = new Date(partesFecha[2], partesFecha[1] - 1, partesFecha[0]);
                        const diferenciaDias = (ahora - fechaIngreso) / (1000 * 60 * 60 * 24);

                        if (diferenciaDias >= 2) {
                            fila.className = "row-antiguo"; // Resalta en Amarillo
                        } else if (p.calidad !== "Visita" && restringido) {
                            fila.className = "row-alerta"; // Resalta en Naranja (Fuera de hora)
                            hayAlertaTurno = true;
                        }

                        fila.innerHTML = `
                            <td>${p.fecha || '-'}</td>
                            <td>${p.hora}</td>
                            <td>${p.nombre}</td>
                            <td>${p.calidad}</td>
                            <td>${p.lote}</td>
                            <td>${p.patente || '-'}</td>
                        `;
                        tbody.appendChild(fila);
                    });
                    
                    alertaBox.style.display = hayAlertaTurno ? "block" : "none";
                });
        }

        setInterval(actualizarReloj, 1000);
        actualizarReloj();
        actualizar();
        setInterval(actualizar, 30000); // Se actualiza cada 30 segundos
    </script>
</body>
</html>
