<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Guardia - Los Algarrobos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; display: flex; justify-content: center; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; width: 100%; }
        h2 { text-align: center; color: #1c1e21; border-bottom: 2px solid #007bff; padding-bottom: 15px; margin-top: 0; }
        .search-box { background: #e7f3ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #b2d4ff; }
        .status-msg { text-align: center; font-weight: bold; padding: 10px; border-radius: 5px; margin-top: 10px; display: none; }
        .autorizado { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .no-autorizado { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info-fecha { text-align: center; font-weight: bold; color: #007bff; background: #f8f9fa; padding: 10px; border-radius: 6px; border: 1px dashed #ccc; margin-bottom: 15px; font-size: 14px; }
        label { display: block; margin-top: 12px; font-weight: bold; font-size: 14px; color: #444; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn-check { background: #007bff; color: white; width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-save { background: #28a745; color: white; width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 25px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Panel de Ingreso</h2>
        <div class="search-box">
            <label>DNI a Consultar:</label>
            <input type="number" id="dniBusqueda">
            <button type="button" class="btn-check" onclick="verificarDNI()">VERIFICAR</button>
            <div id="resultado" class="status-msg"></div>
        </div>
        <form id="visitaForm">
            <div id="relojGuardia" class="info-fecha">Cargando fecha...</div>
            <input type="hidden" name="origen" value="GUARDIA">
            <label>Movimiento</label>
            <select name="movimiento">
                <option value="INGRESO">🟢 INGRESO</option>
                <option value="SALIDA">🔴 SALIDA</option>
            </select>
            <label>Nombre y Apellido</label>
            <input type="text" name="nombre" id="nombreField" required>
            <label>Calidad</label>
            <select name="calidad" id="calidadField">
                <option value="Visita">Visita Social</option>
                <option value="Empleada Doméstica">Empleada Doméstica</option>
                <option value="Jardinero">Jardinero</option>
                <option value="Carpintero">Carpintero</option>
                <option value="Albañil">Albañil</option>
                <option value="Plomero">Plomero</option>
                <option value="Otros">Otros</option>
            </select>
            <label>DNI</label>
            <input type="number" name="dni" id="dniField" required>
            <label>Lote</label>
            <input type="text" name="lote" id="loteField" required>
            <label>Patente</label>
            <input type="text" name="patente">
            <label>Observaciones</label>
            <input type="text" name="observaciones">
            <button type="submit" id="btnEnviar" class="btn-save">REGISTRAR MOVIMIENTO</button>
        </form>
    </div>
    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwha5jW5OTt63tQzjL6b51Lp9HASHPG6QUC9hkdZHELqLSUtnfT9khHJURO3pZOTPT-/exec';
        
        function actualizarReloj() {
            const ahora = new Date();
            const opciones = { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('relojGuardia').innerText = "Registro: " + ahora.toLocaleDateString('es-AR', opciones);
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        function verificarDNI() {
            const dni = document.getElementById('dniBusqueda').value;
            const resDiv = document.getElementById('resultado');
            if(!dni) return alert("Ingrese DNI");
            resDiv.style.display = "block"; resDiv.className = "status-msg"; resDiv.innerText = "Buscando...";
            fetch(`${scriptURL}?dni=${dni}`)
                .then(res => res.json())
                .then(data => {
                    if(data.status === "AUTORIZADO") {
                        resDiv.innerText = `✅ AUTORIZADO: Lote ${data.lote}`;
                        resDiv.className = "status-msg autorizado";
                        document.getElementById('nombreField').value = data.nombre;
                        document.getElementById('dniField').value = dni;
                        document.getElementById('loteField').value = data.lote;
                        document.getElementById('calidadField').value = data.calidad;
                    } else {
                        resDiv.innerText = data.status === "VENCIDO" ? "⛔ VENCIDO" : "❌ SIN AUTORIZACIÓN";
                        resDiv.className = "status-msg no-autorizado";
                        document.getElementById('dniField').value = dni;
                    }
                });
        }

        document.getElementById('visitaForm').addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true; btn.innerText = "Guardando...";
            fetch(scriptURL, { method: 'POST', body: new FormData(e.target)})
                .then(() => { 
                    alert("Guardado"); 
                    e.target.reset(); 
                    document.getElementById('resultado').style.display = "none";
                    document.getElementById('dniBusqueda').value = "";
                    btn.disabled = false; btn.innerText = "REGISTRAR MOVIMIENTO"; 
                });
        });
    </script>
</body>
</html>
