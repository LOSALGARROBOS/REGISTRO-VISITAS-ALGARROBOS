<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardia - Control de Acceso</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; display: flex; justify-content: center; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; width: 100%; }
        h2 { text-align: center; color: #1c1e21; margin-bottom: 20px; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .search-box { background: #e7f3ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #b2d4ff; }
        .status-msg { text-align: center; font-weight: bold; margin-top: 10px; padding: 10px; border-radius: 5px; display: none; }
        .autorizado { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .no-autorizado { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 14px; color: #444; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; font-size: 16px; }
        .btn-check { background: #007bff; color: white; }
        .btn-save { background: #28a745; color: white; margin-top: 20px; }
        .btn:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Panel de Guardia</h2>
        
        <div class="search-box">
            <label>Verificar DNI de Visita:</label>
            <input type="number" id="dniBusqueda" placeholder="Ingrese DNI para verificar">
            <button type="button" class="btn btn-check" onclick="verificarDNI()">BUSCAR AUTORIZACIÓN</button>
            <div id="resultado" class="status-msg"></div>
        </div>

        <form id="visitaForm">
            <input type="hidden" name="origen" value="GUARDIA">
            <label>Movimiento</label>
            <select name="movimiento">
                <option value="INGRESO" selected>🟢 INGRESO</option>
                <option value="SALIDA">🔴 SALIDA</option>
            </select>
            <label>Nombre Visitante</label>
            <input type="text" name="nombre" id="nombreField" required>
            <label>DNI</label>
            <input type="number" name="dni" id="dniField" required>
            <label>Lote</label>
            <input type="text" name="lote" id="loteField" required>
            <label>Patente</label>
            <input type="text" name="patente" placeholder="Opcional">
            <label>Observaciones</label>
            <input type="text" name="observaciones">
            <button type="submit" id="btnEnviar" class="btn btn-save">GUARDAR REGISTRO FINAL</button>
        </form>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyhQ1HevZIeim1GQmICm0nKaOOmVwr1GnaG0jHTNNX0exHyZE4QG5RuJkaP3-vReoTcyw/exec';

        function verificarDNI() {
            const dni = document.getElementById('dniBusqueda').value;
            const resDiv = document.getElementById('resultado');
            if(!dni) return alert("Ingrese un DNI");
            resDiv.style.display = "block";
            resDiv.className = "status-msg";
            resDiv.innerText = "Consultando...";

            fetch(`${scriptURL}?dni=${dni}`)
                .then(response => response.json())
                .then(data => {
                    if(data.status === "AUTORIZADO") {
                        resDiv.innerText = `✅ AUTORIZADO: Visita a ${data.lote}`;
                        resDiv.classList.add("autorizado");
                        document.getElementById('nombreField').value = data.nombre;
                        document.getElementById('dniField').value = dni;
                        document.getElementById('loteField').value = data.lote;
                    } else {
                        resDiv.innerText = "❌ NO ENCONTRADO EN AUTORIZACIONES";
                        resDiv.classList.add("no-autorizado");
                        document.getElementById('dniField').value = dni;
                    }
                })
                .catch(error => { resDiv.innerText = "Error de conexión"; });
        }

        const form = document.getElementById('visitaForm');
        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "Guardando...";
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(() => {
                    alert("¡Registro guardado!");
                    form.reset();
                    document.getElementById('resultado').style.display = "none";
                    document.getElementById('dniBusqueda').value = "";
                    btn.disabled = false;
                    btn.innerText = "GUARDAR REGISTRO FINAL";
                });
        });
    </script>
</body>
</html>
