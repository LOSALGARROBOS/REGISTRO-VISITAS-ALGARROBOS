<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autorizar Visita - Los Algarrobos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e9ecef; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; width: 100%; }
        h2 { color: #6610f2; text-align: center; margin-bottom: 25px; border-bottom: 3px solid #6610f2; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #444; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: #6610f2; outline: none; box-shadow: 0 0 5px rgba(102,16,242,0.2); }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 30px; background: #6610f2; color: white; font-size: 18px; transition: 0.3s; }
        .btn:hover { background: #520dc2; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .nota { font-size: 12px; color: #777; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Nueva Autorización</h2>
        <form id="vecinoForm">
            <input type="hidden" name="origen" value="VECINO">

            <label>N° de Lote</label>
            <input type="text" name="lote" placeholder="Ej: 124" required>

            <label>DNI del Visitante / Trabajador</label>
            <input type="number" name="dni" placeholder="Sin puntos" required>

            <label>Nombre y Apellido</label>
            <input type="text" name="nombre" placeholder="Nombre completo" required>

            <label>Tipo de Visita (Calidad)</label>
            <select name="calidad">
                <option value="Visita">Visita Social</option>
                <option value="Empleada Doméstica">Empleada Doméstica</option>
                <option value="Jardinero">Jardinero</option>
                <option value="Carpintero">Carpintero</option>
                <option value="Albañil">Albañil</option>
                <option value="Plomero">Plomero</option>
                <option value="Otros">Otros / Proveedor</option>
            </select>

            <label>Válido hasta (Fecha de Vencimiento)</label>
            <input type="date" name="vence" id="venceDate" required>
            
            <button type="submit" id="btnSubmit" class="btn">ENVIAR AUTORIZACIÓN</button>
            <p class="nota">Esta autorización figurará inmediatamente en el sistema de la guardia.</p>
        </form>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwha5jW5OTt63tQzjL6b51Lp9HASHPG6QUC9hkdZHELqLSUtnfT9khHJURO3pZOTPT-/exec';
        
        // Establecer la fecha de hoy por defecto
        const hoy = new Date().toISOString().split('T')[0];
        document.getElementById('venceDate').value = hoy;

        document.getElementById('vecinoForm').addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            
            btn.disabled = true;
            btn.innerText = "Procesando...";

            fetch(scriptURL, { method: 'POST', body: new FormData(e.target)})
                .then(response => {
                    alert("Autorización enviada correctamente a la guardia.");
                    e.target.reset();
                    document.getElementById('venceDate').value = hoy; // Resetear fecha a hoy
                    btn.disabled = false;
                    btn.innerText = "ENVIAR AUTORIZACIÓN";
                })
                .catch(error => {
                    alert("Hubo un error al enviar. Por favor intente de nuevo.");
                    btn.disabled = false;
                    btn.innerText = "ENVIAR AUTORIZACIÓN";
                    console.error('Error!', error.message);
                });
        });
    </script>
</body>
</html>
